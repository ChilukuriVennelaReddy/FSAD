<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Palette Interaction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="color-box" class="box">
        <p id="quote">"Unity is strength."</p>
    </div>

    <div class="controls">
        <input type="text" id="color-input" placeholder="Type a color (e.g. red)">
        <button id="fg-btn">Change Foreground</button>
        <button id="bg-btn">Change Background</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
